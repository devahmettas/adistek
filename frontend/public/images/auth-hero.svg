<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#042f2e"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="gold" x1="200" y1="200" x2="600" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5d78e"/>
      <stop offset="0.5" stop-color="#d4a853"/>
      <stop offset="1" stop-color="#a67c2e"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(400 420) rotate(90) scale(320 280)">
      <stop stop-color="#14b8a6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <ellipse cx="400" cy="420" rx="300" ry="260" fill="url(#glow)" filter="url(#soft)"/>
  <circle cx="140" cy="180" r="80" fill="#14b8a6" fill-opacity="0.12"/>
  <circle cx="680" cy="780" r="100" fill="#d4a853" fill-opacity="0.1"/>

  <!-- Display case / vitrin -->
  <rect x="120" y="280" width="560" height="380" rx="24" fill="#0f172a" fill-opacity="0.6" stroke="url(#teal)" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="140" y="300" width="520" height="340" rx="16" fill="#1e293b" fill-opacity="0.5"/>

  <!-- Gold ring -->
  <ellipse cx="320" cy="470" rx="70" ry="70" stroke="url(#gold)" stroke-width="14" fill="none"/>
  <ellipse cx="320" cy="470" rx="52" ry="52" stroke="#f5ecd8" stroke-width="3" fill="none" stroke-opacity="0.5"/>
  <path d="M290 440 L320 410 L350 440" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Necklace -->
  <path d="M460 380 Q520 520 580 380" stroke="url(#gold)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <circle cx="520" cy="470" r="28" fill="url(#gold)"/>
  <circle cx="520" cy="470" r="14" fill="#fef3c7" fill-opacity="0.6"/>

  <!-- Bracelet -->
  <ellipse cx="400" cy="580" rx="90" ry="28" stroke="url(#gold)" stroke-width="10" fill="none"/>

  <!-- Gem stones -->
  <polygon points="220,560 240,520 260,560 240,590" fill="url(#teal)" fill-opacity="0.9"/>
  <polygon points="580,540 600,500 620,540 600,570" fill="url(#teal)" fill-opacity="0.7"/>

  <!-- Sparkles -->
  <circle cx="180" cy="350" r="3" fill="#f5d78e" fill-opacity="0.8"/>
  <circle cx="620" cy="320" r="2.5" fill="#2dd4bf" fill-opacity="0.9"/>
  <circle cx="500" cy="620" r="2" fill="#f5d78e" fill-opacity="0.7"/>
  <circle cx="250" cy="620" r="2" fill="#2dd4bf" fill-opacity="0.6"/>

  <!-- Counter surface -->
  <rect x="80" y="680" width="640" height="12" rx="6" fill="url(#gold)" fill-opacity="0.3"/>
  <rect x="100" y="700" width="600" height="180" rx="20" fill="#0f172a" fill-opacity="0.7" stroke="#334155" stroke-width="1"/>

  <!-- Scale / terazi hint -->
  <rect x="340" y="740" width="120" height="8" rx="4" fill="#475569"/>
  <circle cx="400" cy="736" r="16" fill="url(#teal)" fill-opacity="0.8"/>

  <text x="400" y="900" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="22" font-weight="500" letter-spacing="0.2em">KUYUMCU YÖNET0M0</text>
</svg>
